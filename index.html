<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Current Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h2 class="judul">Motor Current Calculator</h2>

<label>Power (kW)</label>
<input type="number" id="power">

<br><br>

<label>Voltage (V)</label>
<input type="number" id="voltage">

<br><br>

<label>Power Factor</label>
<input type="number" id="pf" step="0.01">

<br><br>

<label>Efficiency</label>
<input type="number" id="eff" step="0.01">

<br><br>

<label>Cable Length (m)</label>
<input type="number" id="length">

<br><br>

<label>Cable Resistance (Ω/km)</label>
<input type="number" id="resistance" step="0.01">

<br><br>

<label>Phase</label>

<select id="phase">

<option value="1">
1 Phase
</option>

<option value="3" selected>
3 Phase
</option>

</select>

<br><br>    
    
<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<script src="script.js"></script>

</div>
<div class="result-box">
    <h3>Recommended MCCB</h3>
    <p id="mccbResult">-</p>
</div>
</body>
</html>
