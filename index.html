<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Current Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h2 class="judul">Kalkulator Daya</h2>

<label>Daya (kW)</label>
<input type="number" id="daya">

<br><br>

<label>Tegangan (V)</label>
<input type="number" id="tegangan">

<br><br>

<label>Power Factor</label>
<input type="number" id="pf" step="0.01">

<br><br>

<label>Efisiensi</label>
<input type="number" id="eff" step="0.01">

<br><br>

<label>Panjang Kabel (m)</label>
<input type="number" id="panjang">

<br><br>

<label>Resistor (Ω/km)</label>
<input type="number" id="resistansi" step="0.01">

<br><br>

<label>Fasa</label>

<select id="fasa">

<option value="1">
1 Fasa
</option>

<option value="3" selected>
3 Fasa
</option>

</select>

<br><br>

<label>Motor Starting Factor</label>

<select id="startingFactor">

<option value="5">5 x FLA</option>

<option value="6" selected>6 x FLA</option>

<option value="7">7 x FLA</option>

<option value="8">8 x FLA</option>

</select>

<br><br>
    
<button onclick="kalkulasi()">Kalkulasi</button>

<h3 id="hasil"></h3>

<script src="script.js"></script>

</div>
</body>
</html>
